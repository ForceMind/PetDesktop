name: Deploy Coco Web Pet

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'assets/frame_animation_v2/**'
      - 'assets/rig/app_icon.png'
      - 'tools/test_web.py'
      - 'tools/assemble_web.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Assemble static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Validate web edition
        run: python tools/test_web.py
      - name: Assemble Pages artifact
        run: python tools/assemble_web.py .pages-dist
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-dist

  deploy:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
