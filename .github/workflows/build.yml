name: Build Coco Desktop Pet

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build single-file executable
        shell: pwsh
        run: ./build.ps1 -Clean
      - name: Run smoke test
        shell: pwsh
        run: ./smoke_test.ps1 -Headless
      - name: Verify whole-frame animation continuity
        shell: pwsh
        run: ./tools/test_animation_continuity.ps1
      - name: Install image verification dependencies
        run: python -m pip install Pillow numpy
      - name: Verify authored whole-character frame assets
        run: python ./tools/test_authored_frames.py
      - name: Validate macOS whole-frame source
        run: python ./tools/validate_macos_source.py
      - name: Verify seven click regions
        shell: pwsh
        run: ./tools/test_click_regions.ps1
      - name: Verify system-language UI policy
        shell: pwsh
        run: ./tools/test_system_language.ps1
      - name: Prepare stable release filename
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item (Get-ChildItem dist -Filter '*.exe' | Select-Object -First 1).FullName release/CocoDesktopPet-Windows.exe
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: CocoDesktopPet-Windows
          path: release/CocoDesktopPet-Windows.exe
          if-no-files-found: error

  macos:
    name: macOS App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build universal App bundle
        run: |
          chmod +x build_macos.command
          CI=1 ./build_macos.command
      - name: Verify universal architectures
        run: |
          APP_PATH="$(find dist-macos -maxdepth 1 -name '*.app' -print -quit)"
          lipo -archs "$APP_PATH/Contents/MacOS/CocoDesktopPet"
      - name: Prepare stable release filename
        run: cp dist-macos/*-macOS.zip dist-macos/CocoDesktopPet-macOS-universal.zip
      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: CocoDesktopPet-macOS
          path: dist-macos/CocoDesktopPet-macOS-universal.zip
          if-no-files-found: error

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
